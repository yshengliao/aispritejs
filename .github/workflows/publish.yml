name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the full gate without publishing"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    name: publish (node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm CLI to 11+ (needed for OIDC trusted publisher)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=${TAG_VERSION} pkg=${PKG_VERSION}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test with coverage thresholds
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Verify package exports
        run: pnpm verify:exports

      - name: Check bundle sizes
        run: pnpm check:size

      - name: Verify llms-full.txt is up to date
        run: pnpm verify:llms

      - name: Publish dry-run (audit tarball)
        run: npm publish --dry-run --access public

      - name: Publish to npm (OIDC + provenance)
        if: github.event_name == 'push' || github.event.inputs.dry-run != 'true'
        # Use `npm publish` directly (not `pnpm publish`) so the npm CLI's
        # OIDC trusted-publisher flow kicks in via the `id-token: write`
        # permission set on this job. No NPM_TOKEN secret is needed; the
        # GitHub OIDC token is exchanged for a short-lived npm credential.
        run: npm publish --access public --provenance --ignore-scripts

      - name: Publish summary
        if: github.event_name == 'push' || github.event.inputs.dry-run != 'true'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "### Published \`aispritejs@${PKG_VERSION}\` to npm" >> $GITHUB_STEP_SUMMARY
          echo "View on npmjs: <https://www.npmjs.com/package/aispritejs/v/${PKG_VERSION}>" >> $GITHUB_STEP_SUMMARY
